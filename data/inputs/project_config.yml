project:
  name: "Stachys affinis stachyose -> SCFA -> host metabolism"
  independent_variable: "Stachys affinis-derived stachyose dose"
  conditions:
    - StachysDose_Low
    - StachysDose_Mid
    - StachysDose_High

human_model:
  recon3d:
    sbml_path: "data/models/Recon3D.xml.gz"
    label: "Recon3D"
  human_gem:
    sbml_path: "data/models/Human-GEM.xml"
    label: "Human-GEM"

host_simulation:
  oxygen_uptake: 100.0
  glucose_uptake: 1.0
  amino_acid_uptake: 0.01
  vitamin_uptake: 0.01
  objective:
    prefer_biomass: false
    prefer_atp_maintenance: true
  solver: "glpk"

sensitivity:
  acetate_range: [0.5, 1.0, 2.0, 4.0, 8.0, 12.0]
  propionate_range: [0.0, 0.7, 1.4, 2.8, 5.0]
  butyrate_range: [0.0, 0.4, 0.8, 1.6, 3.0]
  glucose_range: [0.1, 0.5, 1.0, 2.0, 5.0]
  oxygen_range: [10.0, 50.0, 100.0, 200.0]

outputs:
  merged_results_csv: "results/merged_dose_scfa_host.csv"
